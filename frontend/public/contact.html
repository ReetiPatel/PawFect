<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFect Grooming - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">PawFect</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <h1>Contact Us</h1>
    </section>

    <!-- Contact Content -->
    <section class="contact">
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p><strong>Address:</strong> B Block, Satya Satsang Complex, Nana Bazaar, Anand 388315</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Email:</strong> hello@pawfect.com</p>
            <p><strong>Hours:</strong> Mon-Sat: 9AM - 6PM</p>
        </div>

        <div class="contact-form">
            <h2>Send a Message</h2>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 PawFect Grooming. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
